---
- name: Create Nexus project directory
  file:
    path: /opt/nexus-docker-registry
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy docker-compose.yml to server
  copy:
    src: docker-compose.yml
    dest: /opt/nexus-docker-registry/docker-compose.yml
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Start Nexus with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/nexus-docker-registry
    state: present
  become_user: ubuntu

- name: Wait for Nexus UI to be reachable (can take 2-3 minutes)
  uri:
    url: http://localhost:8081
    status_code: 200
  register: nexus_up
  until: nexus_up.status == 200
  retries: 30
  delay: 10

- name: Read initial admin password
  command: docker exec nexus cat /nexus-data/admin.password
  register: admin_password
  changed_when: false

- name: Show Nexus access information
  debug:
    msg:
      - "============================================"
      - " Nexus is UP and ready!"
      - "============================================"
      - " UI:              http://{{ ansible_host }}:8081"
      - " Docker Group:    {{ ansible_host }}:5002"
      - " Docker Hosted:   {{ ansible_host }}:5000"
      - " Docker Proxy:    {{ ansible_host }}:5001"
      - " Username:        admin"
      - " Initial Password: {{ admin_password.stdout }}"
      - "============================================"
      - " Next: log in and create the repositories"
      - " following the README instructions."
      - "============================================"
